name: Roomspot monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: roomspot-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll Roomspot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python roomspot_monitor.py --once

      - name: Commit state
        run: |
          git config user.name "roomspot-monitor[bot]"
          git config user.email "roomspot-monitor[bot]@users.noreply.github.com"
          git add seen.json
          if git diff --cached --quiet; then
            echo "No state change"
          else
            git commit -m "Update seen.json"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
